# podman-compose.dev.yml — Hot-reload development stack
# Mounts source code as volumes; services restart on file changes.
# Run with: podman compose -f podman-compose.dev.yml up
#
# Podman notes:
#   - Rootless mode: host ports below 1024 require: sysctl net.ipv4.ip_unprivileged_port_start=0
#   - Volumes use the host user's UID/GID automatically — no chown needed.
#   - For systemd-managed restarts in dev, see: podman generate systemd

name: relevix-dev

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relevix
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: relevix_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks: [relevix-dev-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [relevix-dev-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: dev-cluster-id-000000
    networks: [relevix-dev-net]

  # ── Note: Node / Go apps run locally via `pnpm dev` / `go run` ──────────────
  # They connect to the infra containers above via localhost ports.

volumes:
  postgres_dev_data:

networks:
  relevix-dev-net:
    driver: bridge
