# ─── Grafana Loki — log aggregation ──────────────────────────────────────────
#
# All Relevix services emit newline-delimited JSON to stdout.
# Promtail (sidecar / DaemonSet) scrapes stdout and ships to Loki.
#
# Loki retains logs for 72 h in dev.  In production use S3/GCS backend.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory:  /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 72h

ruler:
  alertmanager_url: http://alertmanager:9093
