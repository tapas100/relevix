# ─── Alerting rules ───────────────────────────────────────────────────────────
#
# Severity tiers:
#   page    — wakes someone up now (P1, SLA breach imminent)
#   warn    — next-business-day acknowledgement (P3)
#
# Routing (alertmanager):
#   page → PagerDuty on-call rotation
#   warn → Slack #relevix-alerts

groups:

  - name: api_gateway_sla
    rules:

      # ── Latency ─────────────────────────────────────────────────────────────
      - alert: HighP99Latency
        expr: job:http_request_duration_p99:5m > 0.5
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "API Gateway P99 latency above 500 ms"
          description: |
            P99 latency is {{ $value | humanizeDuration }} (threshold 500 ms).
            Check rule-engine response times and Redis cache hit rate.
          runbook_url: "https://wiki.example.com/runbooks/high-latency"

      - alert: ElevatedP50Latency
        expr: job:http_request_duration_p50:5m > 0.1
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "API Gateway P50 latency above 100 ms"
          description: "Median latency is {{ $value | humanizeDuration }}."

      # ── Error rate ───────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: job:http_error_rate:rate5m > 0.05
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "API Gateway 5xx error rate above 5%"
          description: |
            Error rate: {{ $value | humanizePercentage }}.
            Investigate recent deployments and downstream health.
          runbook_url: "https://wiki.example.com/runbooks/high-error-rate"

      # ── Circuit breaker ──────────────────────────────────────────────────────
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{name="rule-engine"} == 2
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Rule-engine circuit breaker is OPEN"
          description: |
            The circuit has been open for more than 1 minute.
            All intelligence endpoints are serving fallback responses.
          runbook_url: "https://wiki.example.com/runbooks/circuit-breaker-open"

      # ── Cache ────────────────────────────────────────────────────────────────
      - alert: LowCacheHitRate
        expr: job:cache_hit_rate:rate5m{namespace="insights"} < 0.5
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Insights cache hit rate below 50%"
          description: |
            Current hit rate: {{ $value | humanizePercentage }}.
            Increase INTELLIGENCE_CACHE_TTL_SECONDS or investigate Redis eviction.

      # ── OpenAI cost ──────────────────────────────────────────────────────────
      - alert: OpenAiTokenBudgetSpike
        expr: job:openai_tokens:rate1m > 10000
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "OpenAI token consumption above 10 000 tokens/min"
          description: |
            Current rate: {{ $value }} tokens/min.
            Review AI_NARRATOR_ENABLED and consider raising INTELLIGENCE_RATE_LIMIT_MAX.

      - alert: HighOpenAiFallbackRate
        expr: job:openai_fallback_rate:rate5m > 0.3
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "OpenAI fallback rate above 30%"
          description: |
            {{ $value | humanizePercentage }} of AI narrator calls are falling back.
            Check OPENAI_API_KEY validity and network connectivity to api.openai.com.

  - name: infrastructure
    rules:

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Redis is unreachable"
          description: "Redis exporter has been down for 1 minute."

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Postgres is unreachable"
          description: "Postgres exporter has been down for 1 minute."

      - alert: ServiceDown
        expr: up{job=~"api-gateway|rule-engine|ingestion|signal-processor"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Relevix service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for 2 minutes."
