# ─── Grafana Tempo — distributed tracing backend ─────────────────────────────
#
# Receives OTLP traces from all Relevix services via OTLP/HTTP on port 4318.
# Queried by Grafana via its built-in Tempo datasource (port 3200).
#
# Storage: local filesystem (dev). In production replace with:
#   - AWS S3:   backend: s3
#   - GCS:      backend: gcs
#   - Azure:    backend: azure

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h   # keep traces for 48 hours in dev

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

querier:
  frontend_worker:
    frontend_address: localhost:9095

query_frontend:
  search:
    max_duration: 0   # unlimited search

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

# Enable service graph and span metrics for RED method in Grafana
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
