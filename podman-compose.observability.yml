# ─── Relevix Observability Stack ──────────────────────────────────────────────
#
# Brings up:
#   prometheus  :9090  — metrics scraper + alerting
#   grafana     :3030  — dashboards (login: admin / relevix-dev)
#   tempo       :3200  — distributed tracing (OTLP on :4317/:4318)
#   loki        :3100  — log aggregation
#   promtail    :9080  — log shipper
#   alertmanager:9093  — alert routing
#
# Usage:
#   podman-compose -f podman-compose.observability.yml up -d
#
# Prerequisites:
#   - Main infra containers must be running (podman-compose.yml)
#   - Set GRAFANA_ADMIN_PASSWORD in your env or .env

services:

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: relevix-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle           # POST /-/reload to hot-reload config
      - --web.enable-remote-write-receiver  # for Tempo metrics_generator
    networks:
      - relevix

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: relevix-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - relevix

  # ── Grafana Tempo ─────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.2
    container_name: relevix-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"    # query
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yml"]
    networks:
      - relevix

  # ── Grafana Loki ──────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: relevix-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/tmp/loki
    command: ["-config.file=/etc/loki/config.yml"]
    networks:
      - relevix

  # ── Promtail ──────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: relevix-promtail
    restart: unless-stopped
    ports:
      - "9080:9080"
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    networks:
      - relevix

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: relevix-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-relevix-dev}
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3030"
      # Disable telemetry — no data sent to grafana.com
      GF_ANALYTICS_REPORTING_ENABLED:     "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:     "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - relevix

  # ── Redis exporter (exposes Redis metrics for Prometheus) ─────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: relevix-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://relevix-redis:6379
    networks:
      - relevix

  # ── Postgres exporter ─────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: relevix-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://relevix:devpassword@relevix-postgres:5432/relevix_dev?sslmode=disable"
    networks:
      - relevix

volumes:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:

networks:
  relevix:
    external: true
    name: relevix
